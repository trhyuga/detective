<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>雪嶺の二重奏</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;500;700&family=Shippori+Mincho:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #e8e4d8;
    --ink-dim: #a8a494;
    --paper: #0a0e14;
    --paper-2: #12171f;
    --accent-ice: #7ab8d4;
    --accent-ember: #c9593a;
    --accent-gold: #b89968;
    --choice-bg: rgba(18, 23, 31, 0.88);
    --choice-border: rgba(184, 153, 104, 0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Shippori Mincho', 'Noto Serif JP', serif;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none;
    user-select: none;
    -webkit-text-size-adjust: 100%;
    overscroll-behavior: none;
    touch-action: manipulation; /* iOS ダブルタップズーム抑止 */
  }

  /* デスクトップは最大幅を持たせて中央寄せ、黒帯演出 */
  #game {
    position: relative;
    width: 100%;
    height: 100%;
    max-width: 760px;
    margin: 0 auto;
    overflow: hidden;
    box-shadow: 0 0 80px rgba(0, 0, 0, 0.6);
    /* iPhone ノッチ・ホームインジケータ */
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
    /* 子要素を inset 内に収める */
    box-sizing: border-box;
  }
  @media (min-width: 761px) {
    body {
      background: #020408;
    }
  }

  .scene-bg {
    position: absolute;
    inset: 0;
    transition: opacity 1.2s ease, filter 1.2s ease;
    z-index: 1;
  }

  .scene-bg::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 50% 120%, rgba(122, 184, 212, 0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 30% -20%, rgba(201, 89, 58, 0.04) 0%, transparent 50%),
      linear-gradient(180deg, #050810 0%, #0a0e14 50%, #0d1119 100%);
  }

  .snow {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 2;
    overflow: hidden;
  }
  .snow span {
    position: absolute;
    top: -10px;
    color: rgba(232, 228, 216, 0.6);
    font-size: 10px;
    animation: fall linear infinite;
  }
  @keyframes fall {
    0% { transform: translateY(-10vh) translateX(0); opacity: 0; }
    10% { opacity: 0.8; }
    100% { transform: translateY(110vh) translateX(40px); opacity: 0; }
  }

  .bg-exterior::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 50% 85%, rgba(30, 40, 55, 0.8) 0%, transparent 70%),
      radial-gradient(circle at 50% 70%, rgba(201, 150, 80, 0.15) 0%, transparent 30%);
  }
  .bg-dining::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 50% 60%, rgba(201, 89, 58, 0.18) 0%, transparent 70%),
      radial-gradient(circle at 50% 40%, rgba(184, 153, 104, 0.2) 0%, transparent 40%);
  }
  .bg-hall::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 70% 50% at 30% 70%, rgba(201, 89, 58, 0.3) 0%, transparent 60%),
      radial-gradient(circle at 80% 30%, rgba(122, 100, 80, 0.1) 0%, transparent 40%);
  }
  .bg-study::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 50% 30% at 50% 50%, rgba(100, 140, 80, 0.18) 0%, transparent 70%);
  }
  .bg-corridor::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 40% 80% at 50% 50%, rgba(80, 70, 60, 0.2) 0%, transparent 80%);
  }
  .bg-bedroom::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 50% 60%, rgba(180, 140, 90, 0.12) 0%, transparent 70%),
      radial-gradient(ellipse 70% 60% at 30% 20%, rgba(80, 100, 140, 0.1) 0%, transparent 60%);
  }
  .bg-dawn::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(180deg, rgba(220, 200, 180, 0.25) 0%, rgba(200, 180, 160, 0.1) 40%, transparent 70%),
      radial-gradient(ellipse 80% 30% at 50% 15%, rgba(240, 200, 170, 0.18) 0%, transparent 60%);
  }

  #title-screen {
    position: absolute;
    inset: 0;
    z-index: 100;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: var(--paper);
    transition: opacity 1.5s ease;
  }
  #title-screen.hidden {
    opacity: 0;
    pointer-events: none;
  }
  .title-main {
    font-family: 'Shippori Mincho', serif;
    font-weight: 900;
    font-size: clamp(2.2rem, 10vw, 3.8rem);
    letter-spacing: 0.3em;
    color: var(--ink);
    text-shadow:
      0 0 20px rgba(122, 184, 212, 0.3),
      0 0 40px rgba(122, 184, 212, 0.15);
    margin-bottom: 0.5em;
    animation: title-fade-in 3s ease-out;
    text-align: center;
  }
  .title-sub {
    font-size: 0.9rem;
    letter-spacing: 0.5em;
    color: var(--accent-ice);
    opacity: 0.7;
    margin-bottom: 3em;
    animation: title-fade-in 3s ease-out 0.8s both;
  }
  .title-ornament {
    width: 40vw;
    max-width: 200px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent-gold), transparent);
    margin: 1.5em 0;
    animation: title-fade-in 3s ease-out 1.2s both;
  }
  .title-start {
    font-size: 1rem;
    letter-spacing: 0.4em;
    padding: 0.8em 2em;
    border: 1px solid var(--choice-border);
    background: transparent;
    color: var(--ink);
    cursor: pointer;
    transition: all 0.4s ease;
    font-family: inherit;
    animation: title-fade-in 3s ease-out 1.8s both, pulse-subtle 3s ease-in-out 3s infinite;
  }
  .title-start:active {
    background: rgba(184, 153, 104, 0.22);
    border-color: var(--accent-gold);
    color: var(--accent-gold);
    transform: scale(0.97);
  }
  @media (hover: hover) {
    .title-start:hover {
      background: rgba(184, 153, 104, 0.15);
      border-color: var(--accent-gold);
      color: var(--accent-gold);
    }
  }
  .title-caption {
    position: absolute;
    bottom: 2em;
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    color: var(--ink-dim);
    opacity: 0.5;
  }
  @keyframes title-fade-in {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse-subtle {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  #story-area {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    padding: 1.5em 1.5em calc(2em + env(safe-area-inset-bottom));
    z-index: 10;
    background: linear-gradient(180deg, transparent 0%, rgba(5, 8, 16, 0.85) 20%, rgba(5, 8, 16, 0.95) 100%);
    min-height: 45%;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
  }
  /* モバイル下部にアクションバーが来たときは本文エリアを広げて重ねない */
  @media (max-width: 520px) {
    #story-area {
      padding-bottom: calc(4.5em + env(safe-area-inset-bottom));
    }
  }
  .speaker {
    font-size: 0.95rem;
    color: var(--accent-gold);
    letter-spacing: 0.15em;
    margin-bottom: 0.6em;
    min-height: 1.2em;
    font-weight: 500;
  }
  .text-box {
    font-size: 1rem;
    line-height: 1.9;
    letter-spacing: 0.05em;
    color: var(--ink);
    min-height: 7em;
    margin-bottom: 1em;
    font-weight: 300;
  }
  .text-box .caret {
    display: inline-block;
    width: 0.5em;
    height: 1em;
    background: var(--accent-gold);
    margin-left: 0.2em;
    vertical-align: -0.1em;
    animation: blink 1s steps(2) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  .next-hint {
    text-align: right;
    font-size: 0.8rem;
    color: var(--ink-dim);
    letter-spacing: 0.3em;
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .next-hint.show {
    opacity: 1;
    animation: hint-float 1.5s ease-in-out infinite;
  }
  @keyframes hint-float {
    0%, 100% { transform: translateX(0); }
    50% { transform: translateX(5px); }
  }

  #choices {
    position: absolute;
    inset: 0;
    z-index: 20;
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 2em 1.5em;
    background: rgba(5, 8, 16, 0.7);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }
  #choices.show { display: flex; }
  .choice-prompt {
    color: var(--accent-ice);
    font-size: 0.85rem;
    letter-spacing: 0.3em;
    margin-bottom: 2em;
    text-align: center;
    opacity: 0.8;
  }
  .choice-btn {
    width: 100%;
    max-width: 440px;
    padding: 1.2em 1.3em;
    margin: 0.4em 0;
    background: var(--choice-bg);
    border: 1px solid var(--choice-border);
    color: var(--ink);
    font-family: inherit;
    font-size: 1rem;
    letter-spacing: 0.1em;
    text-align: left;
    cursor: pointer;
    transition: background-color 0.25s, border-color 0.25s, transform 0.15s;
    position: relative;
    line-height: 1.5;
    min-height: 48px; /* iOS 推奨タップ高 */
  }
  .choice-btn:active {
    background: rgba(184, 153, 104, 0.25);
    border-color: var(--accent-gold);
    transform: scale(0.985);
  }
  @media (hover: hover) {
    .choice-btn:hover {
      background: rgba(184, 153, 104, 0.18);
      border-color: var(--accent-gold);
      transform: translateX(4px);
    }
  }
  .choice-btn::before {
    content: '◇';
    color: var(--accent-gold);
    margin-right: 0.8em;
    opacity: 0.6;
  }

  #clue-notify {
    position: absolute;
    top: 1em;
    left: 50%;
    transform: translateX(-50%) translateY(-120%);
    background: rgba(10, 14, 20, 0.95);
    border: 1px solid var(--accent-gold);
    padding: 0.8em 1.5em;
    font-size: 0.85rem;
    letter-spacing: 0.2em;
    color: var(--accent-gold);
    z-index: 50;
    transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
    max-width: 85%;
    text-align: center;
  }
  #clue-notify.show {
    transform: translateX(-50%) translateY(0);
  }
  .clue-label {
    font-size: 0.7rem;
    color: var(--accent-ice);
    display: block;
    margin-bottom: 0.3em;
    letter-spacing: 0.3em;
  }

  #chapter-title {
    position: absolute;
    inset: 0;
    z-index: 40;
    background: var(--paper);
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    animation: chapter-fade 4s ease-in-out forwards;
  }
  #chapter-title.show { display: flex; }
  .chapter-num {
    font-size: 0.9rem;
    letter-spacing: 0.6em;
    color: var(--accent-gold);
    margin-bottom: 1em;
    opacity: 0;
    animation: text-appear 1.2s ease 0.3s forwards;
  }
  .chapter-name {
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: 0.3em;
    color: var(--ink);
    opacity: 0;
    animation: text-appear 1.2s ease 1s forwards;
    text-align: center;
  }
  @keyframes chapter-fade {
    0% { opacity: 0; }
    15% { opacity: 1; }
    85% { opacity: 1; }
    100% { opacity: 0; pointer-events: none; }
  }
  @keyframes text-appear {
    from { opacity: 0; transform: translateY(20px); letter-spacing: 1em; }
    to { opacity: 1; transform: translateY(0); letter-spacing: 0.3em; }
  }

  #hud {
    position: absolute;
    top: calc(0.8em + env(safe-area-inset-top));
    right: calc(0.8em + env(safe-area-inset-right));
    z-index: 15;
    font-size: 0.7rem;
    color: var(--ink-dim);
    letter-spacing: 0.2em;
    padding: 0.5em 0.8em;
    background: rgba(5, 8, 16, 0.6);
    border: 1px solid rgba(184, 153, 104, 0.2);
    border-radius: 2px;
  }
  #hud .clue-count {
    color: var(--accent-gold);
    font-weight: 500;
  }

  #ending-screen {
    position: absolute;
    inset: 0;
    z-index: 60;
    background: var(--paper);
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 2em 1.5em;
    text-align: center;
    overflow-y: auto;
  }
  #ending-screen.show { display: flex; }
  .ending-tag {
    font-size: 0.75rem;
    letter-spacing: 0.5em;
    color: var(--accent-ice);
    margin-bottom: 1em;
    opacity: 0.8;
  }
  .ending-tag.true { color: var(--accent-gold); }
  .ending-tag.bad { color: var(--accent-ember); }
  .ending-title {
    font-size: 1.6rem;
    letter-spacing: 0.3em;
    color: var(--ink);
    margin-bottom: 1.5em;
    font-weight: 700;
  }
  .ending-text {
    font-size: 0.95rem;
    line-height: 2;
    color: var(--ink);
    max-width: 90%;
    margin-bottom: 2em;
  }
  .ending-summary {
    font-size: 0.8rem;
    color: var(--ink-dim);
    border-top: 1px solid var(--choice-border);
    border-bottom: 1px solid var(--choice-border);
    padding: 1em 0;
    margin: 1em 0 2em;
    max-width: 90%;
    line-height: 1.8;
  }
  .ending-summary strong {
    color: var(--accent-ice);
  }
  .ending-restart {
    padding: 0.8em 2em;
    background: transparent;
    border: 1px solid var(--accent-gold);
    color: var(--accent-gold);
    font-family: inherit;
    font-size: 0.9rem;
    letter-spacing: 0.3em;
    cursor: pointer;
    transition: all 0.3s;
  }
  .ending-restart {
    min-height: 48px;
  }
  .ending-restart:active {
    background: rgba(184, 153, 104, 0.22);
  }
  @media (hover: hover) {
    .ending-restart:hover {
      background: rgba(184, 153, 104, 0.15);
    }
  }

  /* ===== アクションバー ===== */
  #action-bar {
    position: absolute;
    top: calc(0.6em + env(safe-area-inset-top));
    left: 0.6em;
    z-index: 25;
    display: none;
    gap: 0.35em;
    flex-wrap: wrap;
    max-width: calc(100% - 7.5em);
  }
  #action-bar.show { display: flex; }
  .action-btn {
    background: rgba(5, 8, 16, 0.65);
    border: 1px solid rgba(184, 153, 104, 0.3);
    color: var(--ink-dim);
    font-family: inherit;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    padding: 0.55em 0.8em;
    min-width: 3em;
    min-height: 2.2em;
    cursor: pointer;
    transition: background-color 0.2s, color 0.2s, border-color 0.2s;
    border-radius: 2px;
  }
  .action-btn.active {
    color: var(--accent-gold);
    border-color: var(--accent-gold);
    background: rgba(184, 153, 104, 0.2);
  }
  .action-btn:active {
    background: rgba(184, 153, 104, 0.25);
    transform: scale(0.96);
  }
  @media (hover: hover) {
    .action-btn:hover {
      color: var(--accent-gold);
      border-color: var(--accent-gold);
      background: rgba(184, 153, 104, 0.18);
    }
  }
  /* 狭い画面ではアクションバーを下部中央に */
  @media (max-width: 520px) {
    #action-bar {
      top: auto;
      left: 50%;
      bottom: calc(0.6em + env(safe-area-inset-bottom));
      transform: translateX(-50%);
      justify-content: center;
      gap: 0.3em;
      max-width: calc(100% - 1.2em);
      padding: 0.3em;
      background: rgba(5, 8, 16, 0.85);
      border: 1px solid rgba(184, 153, 104, 0.2);
      border-radius: 6px;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
    .action-btn {
      font-size: 0.65rem;
      padding: 0.5em 0.55em;
      min-width: 2.6em;
      letter-spacing: 0.1em;
    }
  }

  /* ===== 汎用パネル ===== */
  .panel {
    position: absolute;
    inset: 0;
    z-index: 70;
    background: rgba(5, 8, 16, 0.96);
    display: none;
    flex-direction: column;
    padding: calc(1.2em + env(safe-area-inset-top)) 1.2em calc(1em + env(safe-area-inset-bottom));
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .panel.show { display: flex; }
  .panel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-bottom: 0.8em;
    border-bottom: 1px solid var(--choice-border);
    margin-bottom: 1em;
  }
  .panel-title {
    color: var(--accent-gold);
    font-size: 1rem;
    letter-spacing: 0.4em;
    font-weight: 700;
  }
  .panel-close {
    background: transparent;
    border: 1px solid var(--choice-border);
    color: var(--ink);
    font-family: inherit;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    padding: 0.55em 0.9em;
    cursor: pointer;
    border-radius: 2px;
    min-height: 44px;
    min-width: 44px;
  }
  .panel-close:active {
    background: rgba(184, 153, 104, 0.2);
    border-color: var(--accent-gold);
  }
  .panel-body {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch; /* iOS 慣性スクロール */
    overscroll-behavior: contain;
    padding-right: 0.3em;
  }
  .panel-body::-webkit-scrollbar {
    width: 4px;
  }
  .panel-body::-webkit-scrollbar-thumb {
    background: rgba(184, 153, 104, 0.35);
  }
  .panel-section {
    margin-bottom: 1.4em;
  }
  .panel-section h3 {
    font-size: 0.8rem;
    color: var(--accent-ice);
    letter-spacing: 0.3em;
    margin-bottom: 0.6em;
    font-weight: 500;
  }

  /* ===== セグメントボタン ===== */
  .seg-group {
    display: flex;
    gap: 0.3em;
    flex-wrap: wrap;
  }
  .seg-btn {
    flex: 1 1 auto;
    min-width: 4em;
    min-height: 44px;
    background: rgba(18, 23, 31, 0.7);
    border: 1px solid var(--choice-border);
    color: var(--ink-dim);
    font-family: inherit;
    font-size: 0.78rem;
    letter-spacing: 0.2em;
    padding: 0.55em 0.3em;
    cursor: pointer;
    border-radius: 2px;
    transition: background-color 0.2s, color 0.2s, border-color 0.2s;
  }
  .seg-btn.active {
    color: var(--accent-gold);
    border-color: var(--accent-gold);
    background: rgba(184, 153, 104, 0.15);
  }
  .seg-btn:active {
    background: rgba(184, 153, 104, 0.2);
  }
  @media (hover: hover) {
    .seg-btn:hover {
      color: var(--accent-gold);
      border-color: var(--accent-gold);
      background: rgba(184, 153, 104, 0.12);
    }
  }

  /* ===== バックログ ===== */
  .log-entry {
    padding: 0.7em 0;
    border-bottom: 1px dashed rgba(184, 153, 104, 0.15);
    font-size: 0.9rem;
    line-height: 1.8;
  }
  .log-entry .log-sp {
    color: var(--accent-gold);
    font-size: 0.8rem;
    margin-bottom: 0.25em;
    letter-spacing: 0.1em;
  }
  .log-entry .log-tx {
    color: var(--ink);
  }

  /* ===== セーブ／ロード スロット ===== */
  .slot {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 0.5em;
    padding: 0.8em 1em;
    background: rgba(18, 23, 31, 0.6);
    border: 1px solid var(--choice-border);
    margin-bottom: 0.6em;
    border-radius: 2px;
  }
  .slot-info {
    flex: 1;
    min-width: 0;
  }
  .slot-name {
    font-size: 0.8rem;
    color: var(--accent-ice);
    letter-spacing: 0.2em;
    margin-bottom: 0.2em;
  }
  .slot-meta {
    font-size: 0.72rem;
    color: var(--ink-dim);
  }
  .slot-actions {
    display: flex;
    gap: 0.3em;
  }
  .slot-btn {
    background: transparent;
    border: 1px solid var(--choice-border);
    color: var(--ink);
    font-family: inherit;
    font-size: 0.72rem;
    letter-spacing: 0.15em;
    padding: 0.55em 0.85em;
    min-height: 40px;
    cursor: pointer;
    border-radius: 2px;
  }

<script>
// ==========================================================================
// ゲーム状態
// ==========================================================================
const gameState = {
  has_clue_A: false, has_clue_B: false, has_clue_C: false, has_clue_D: false,
  has_clue_E: false, has_clue_F: false, has_clue_G: false, has_clue_H: false,
  investigate_count: 0,
  route_choice: null,
  accuse: null,
  alone: false,
  choice_empathy: false,
  talk_to_mizuki_final: false,
  current_scene: 'prologue_01'
};


// ==========================================================================
// 永続化（localStorage）・メタ状態
// ==========================================================================
const STORAGE_KEY = 'setsurei_v1';

const meta = {
  settings: {
    textSpeed: 45,
    autoDelay: 1600
  },
  readScenes: {},            // scene key -> true（既読フラグ）
  seenEndings: {},           // ending id -> count
  slots: [null, null, null], // 3スロット
  autoSlot: null             // 章境界でのオートセーブ
};

function loadMeta() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const obj = JSON.parse(raw);
    Object.assign(meta.settings, obj.settings || {});
    Object.assign(meta.readScenes, obj.readScenes || {});
    Object.assign(meta.seenEndings, obj.seenEndings || {});
    if (Array.isArray(obj.slots)) meta.slots = obj.slots;
    if (obj.autoSlot) meta.autoSlot = obj.autoSlot;
  } catch (e) { /* ignore */ }
}

function saveMeta() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(meta));
  } catch (e) { /* quota etc */ }
}

function resetAllProgress() {
  meta.readScenes = {};
  meta.seenEndings = {};
  meta.slots = [null, null, null];
  meta.autoSlot = null;
  saveMeta();
}

// 現在のゲーム状態をスナップショット
function snapshotState() {
  return {
    gameState: JSON.parse(JSON.stringify(gameState)),
    sceneKey: currentSceneKey,
    lineIdx: currentLineIdx,
    textLog: textLog.slice(-50),
    timestamp: Date.now()
  };
}

function restoreState(snap) {
  Object.keys(gameState).forEach(k => delete gameState[k]);
  Object.assign(gameState, snap.gameState);
  textLog.length = 0;
  if (Array.isArray(snap.textLog)) textLog.push(...snap.textLog);
  updateClueCount();
  currentSceneKey = snap.sceneKey;
  currentLineIdx = snap.lineIdx;
  const scene = scenes[currentSceneKey];
  if (scene) {
    if (scene.bg) setBackground(scene.bg);
    if (scene.lines && currentLineIdx < scene.lines.length) {
      showLine();
    }
  }
}

// ==========================================================================
// 周回判定ヘルパー
// ==========================================================================
function hasReachedNormal() {
  return !!(meta.seenEndings['end_normal']
         || meta.seenEndings['end_normal_b']
         || meta.seenEndings['end_normal_c']);
}
function hasReachedTrue() {
  return !!(meta.seenEndings['end_true_standard']
         || meta.seenEndings['end_true_plus']);
}
function canDetectiveMode() {
  return hasReachedNormal() && hasReachedTrue();
}
function isReplay() {
  return Object.keys(meta.seenEndings).length > 0;
}
function hasExtendedJokes() {
  return !!(meta.seenEndings['end_detective'] && meta.seenEndings['serial_end_massacre']);
}
function hasSeenAllEndings() {
  const required = [
    'end_bad_generic','end_bad_misaki','end_bad_ice','end_bad_fire','end_bad_silent',
    'end_normal','end_normal_b','end_normal_c',
    'end_true_standard','end_true_plus',
    'end_bad_fuyuki_unproven',
    'serial_end_stopped2','serial_end_stopped3',
    'serial_end_fuyuki_mid','serial_end_fuyuki_late',
    'serial_end_wrong_mid','serial_end_massacre',
    'end_detective'
  ];
  return required.every(id => meta.seenEndings[id]);
}

// シーンの effective lines（replayInserts を反映）
function effectiveLines(scene) {
  if (!scene || !scene.lines) return [];
  const base = scene.lines;
  const inserts = [];
  if (scene.replayInserts) {
    scene.replayInserts.forEach(ins => {
      if (!ins.when || ins.when()) inserts.push(ins);
    });
  }
  if (inserts.length === 0) return base;
  // at が大きい順に差し込む
  const sorted = [...inserts].sort((a, b) => b.at - a.at);
  const result = [...base];
  sorted.forEach(ins => result.splice(ins.at, 0, ...ins.lines));
  return result;
}

// シーンの effective choice（replayOptions を反映）
function effectiveChoice(scene) {
  if (!scene || !scene.choice) return scene ? scene.choice : null;
  const base = scene.choice;
  if (!base.replayOptions) return base;
  const extras = base.replayOptions.filter(o => !o.when || o.when());
  if (extras.length === 0) return base;
  return { prompt: base.prompt, options: [...base.options, ...extras] };
}

// ==========================================================================
// ゲームエンジン
// ==========================================================================
let currentSceneKey = null;
let currentLineIdx = 0;
let isTyping = false;
let typingTimeout = null;
let currentFullText = '';

// モード
let autoMode = false;
let skipMode = false;
let autoAdvanceTimer = null;
let skipAdvanceTimer = null;

function setAutoMode(on) {
  autoMode = !!on;
  document.getElementById('btn-auto').classList.toggle('active', autoMode);
  document.getElementById('auto-indicator').classList.toggle('show', autoMode);
  if (!autoMode) clearTimeout(autoAdvanceTimer);
  if (autoMode) scheduleAutoAdvance();
}

function setSkipMode(on) {
  skipMode = !!on;
  document.getElementById('btn-skip').classList.toggle('active', skipMode);
  document.getElementById('skip-indicator').classList.toggle('show', skipMode);
  if (!skipMode) clearTimeout(skipAdvanceTimer);
  if (skipMode) scheduleSkipAdvance();
}

function scheduleAutoAdvance() {
  clearTimeout(autoAdvanceTimer);
  if (!autoMode) return;
  if (document.querySelector('.panel.show')) return;
  if (document.getElementById('choices').classList.contains('show')) return;
  if (document.getElementById('ending-screen').classList.contains('show')) return;
  if (isTyping) return;
  autoAdvanceTimer = setTimeout(() => { advance(); }, meta.settings.autoDelay);
}

function scheduleSkipAdvance() {
  clearTimeout(skipAdvanceTimer);
  if (!skipMode) return;
  if (document.querySelector('.panel.show')) return;
  if (document.getElementById('choices').classList.contains('show')) return;
  if (document.getElementById('ending-screen').classList.contains('show')) return;
  // 既読シーンのみスキップ。未読に入ったら自動停止
  if (!meta.readScenes[currentSceneKey]) {
    setSkipMode(false);
    return;
  }
  if (isTyping) skipTyping();
  skipAdvanceTimer = setTimeout(() => { advance(); }, 40);
}

function addClue(key) {
  if (gameState[key]) return;
  gameState[key] = true;
  updateClueCount();
  showClueNotify(clueDescriptions[key]);
}

function updateClueCount() {
  const count = Object.keys(gameState).filter(k => k.startsWith('has_clue_') && gameState[k]).length;
  document.getElementById('clue-count').textContent = count;
}

function showClueNotify(text) {
  const n = document.getElementById('clue-notify');
  document.getElementById('clue-text').textContent = text;
  n.classList.add('show');
  setTimeout(() => n.classList.remove('show'), 3200);
}

function setBackground(bgClass) {
  const bg = document.getElementById('scene-bg');
  bg.className = 'scene-bg bg-' + bgClass;
}

function showChapterTitle(num, name, cb) {
  const el = document.getElementById('chapter-title');
  document.getElementById('chapter-num').textContent = num;
  document.getElementById('chapter-name').textContent = name;
  el.classList.add('show');
  const numEl = document.getElementById('chapter-num');
  const nameEl = document.getElementById('chapter-name');
  numEl.style.animation = 'none';
  nameEl.style.animation = 'none';
  void numEl.offsetWidth;
  numEl.style.animation = '';
  nameEl.style.animation = '';
  setTimeout(() => {
    el.classList.remove('show');
    if (cb) cb();
  }, 4000);
}

function typeText(text, cb) {
  const tb = document.getElementById('text-box');
  const hint = document.getElementById('next-hint');
  hint.classList.remove('show');
  tb.innerHTML = '';
  currentFullText = text;
  isTyping = true;
  const speed = meta.settings.textSpeed;
  if (speed === 0) {
    tb.innerHTML = text.replace(/\n/g, '<br>');
    isTyping = false;
    hint.classList.add('show');
    if (cb) cb();
    afterLineRendered();
    return;
  }
  let i = 0;
  function step() {
    if (i <= text.length) {
      tb.innerHTML = text.substring(0, i).replace(/\n/g, '<br>') + '<span class="caret"></span>';
      i++;
      typingTimeout = setTimeout(step, speed);
    } else {
      tb.innerHTML = text.replace(/\n/g, '<br>');
      isTyping = false;
      hint.classList.add('show');
      if (cb) cb();
      afterLineRendered();
    }
  }
  step();
}

function afterLineRendered() {
  scheduleAutoAdvance();
  scheduleSkipAdvance();
}

function skipTyping() {
  if (!isTyping) return;
  clearTimeout(typingTimeout);
  document.getElementById('text-box').innerHTML = currentFullText.replace(/\n/g, '<br>');
  isTyping = false;
  document.getElementById('next-hint').classList.add('show');
  afterLineRendered();
}

function showLine() {
  const scene = scenes[currentSceneKey];
  if (!scene) return;
  const lines = effectiveLines(scene);
  const line = lines[currentLineIdx];
  if (!line) return;
  document.getElementById('speaker').textContent = line.sp || '';
  pushLog(line.sp || '', line.tx);
  typeText(line.tx);
}

function advance() {
  if (isTyping) { skipTyping(); return; }
  const scene = scenes[currentSceneKey];
  if (!scene) return;
  const lines = effectiveLines(scene);
  currentLineIdx++;
  if (currentLineIdx >= lines.length) {
    if (scene.onEnd) scene.onEnd();
    const ch = effectiveChoice(scene);
    if (ch) { showChoices(ch); return; }
    if (scene.next) {
      const nextKey = typeof scene.next === 'function' ? scene.next() : scene.next;
      if (nextKey) goToScene(nextKey);
      return;
    }
  } else {
    showLine();
  }
}

function goToScene(key) {
  const wasUnread = !meta.readScenes[key];
  currentSceneKey = key;
  currentLineIdx = 0;
  const scene = scenes[key];
  if (!scene) return;
  // スキップモードは未読シーンに入ったら自動停止
  if (skipMode && wasUnread) setSkipMode(false);
  // 既読フラグ
  meta.readScenes[key] = true;
  // 章境界でオートセーブ
  if (scene.chapter) {
    meta.autoSlot = snapshotState();
  }
  saveMeta();

  if (scene.bg) setBackground(scene.bg);
  if (scene.chapter) {
    showChapterTitle(scene.chapter.num, scene.chapter.name, () => showLine());
  } else {
    if (scene.lines && scene.lines.length > 0) showLine();
  }
}

function showFin() {
  // 他の表示を落とす
  if (autoMode) setAutoMode(false);
  if (skipMode) setSkipMode(false);
  document.getElementById('ending-screen').classList.remove('show');
  document.getElementById('action-bar').classList.remove('show');
  document.getElementById('choices').classList.remove('show');
  document.getElementById('fin-screen').classList.add('show');
}

function showEndingScreen(info) {
  // エンディング到達記録
  meta.seenEndings[currentSceneKey] = (meta.seenEndings[currentSceneKey] || 0) + 1;
  saveMeta();
  // オート・スキップを解除
  if (autoMode) setAutoMode(false);
  if (skipMode) setSkipMode(false);

  const el = document.getElementById('ending-screen');
  const tag = document.getElementById('ending-tag');
  tag.textContent = info.tag;
  tag.className = 'ending-tag ' + info.type;
  document.getElementById('ending-title').textContent = info.title;
  document.getElementById('ending-text').innerHTML = info.text.replace(/\n/g, '<br>');

  const clues = Object.keys(gameState)
    .filter(k => k.startsWith('has_clue_') && gameState[k])
    .map(k => '・' + clueDescriptions[k])
    .join('<br>');
  const count = Object.keys(gameState).filter(k => k.startsWith('has_clue_') && gameState[k]).length;

  let routeLabel = '（未選択）';
  switch (gameState.route_choice) {
    case 'fuyuki': routeLabel = '冬木ルート'; break;
    case 'misaki': routeLabel = '美咲ルート'; break;
    case 'kuonji': routeLabel = '久遠寺ルート'; break;
  }

  document.getElementById('ending-summary').innerHTML = `
    <strong>第一章ルート:</strong> ${routeLabel}<br>
    <strong>入手した手がかり: ${count} / 8</strong><br>
    <strong>調査行動: ${gameState.investigate_count} 回</strong><br><br>
    ${clues || '（手がかりなし）'}<br><br>
    <span style="font-size:0.78rem; color:var(--ink-dim)">
    TRUE END 到達には、伏線 A・D・E・F の四つが必須。<br>
    別のルートを通ると、違う伏線が手に入ります。
    </span>
  `;
  el.classList.add('show');
}

function showChoices(choice) {
  // 選択肢中は自動送り・スキップを解除
  if (autoMode) setAutoMode(false);
  if (skipMode) setSkipMode(false);
  const wrap = document.getElementById('choices');
  const list = document.getElementById('choice-list');
  document.getElementById('choice-prompt').textContent = choice.prompt;
  list.innerHTML = '';
  choice.options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = opt.tx;
    btn.onclick = () => {
      if (opt.apply) opt.apply();
      else if (opt.flag !== undefined) gameState.route_choice = opt.flag;
      wrap.classList.remove('show');
      goToScene(opt.next);
    };
    list.appendChild(btn);
  });
  wrap.classList.add('show');
}

// パネル制御
// ==========================================================================
function openPanel(id) {
  document.querySelectorAll('.panel.show').forEach(p => p.classList.remove('show'));
  const el = document.getElementById(id);
  if (!el) return;
  if (id === 'panel-log') renderLog();
  if (id === 'panel-save') renderSlots();
  if (id === 'panel-clues') renderClues();
  if (id === 'panel-profiles') renderProfiles();
  if (id === 'panel-chapter') renderChapters();
  if (id === 'panel-endings') renderEndings();
  if (id === 'panel-settings') renderSettings();
  el.classList.add('show');
  // パネル表示中はオート・スキップを停止
  clearTimeout(autoAdvanceTimer);
  clearTimeout(skipAdvanceTimer);
}

function closeAllPanels() {
  document.querySelectorAll('.panel.show').forEach(p => p.classList.remove('show'));
  scheduleAutoAdvance();
  scheduleSkipAdvance();
}

function renderLog() {
  const body = document.getElementById('log-body');
  const recent = textLog.slice(-80);
  if (recent.length === 0) {
    body.innerHTML = '<div style="color:var(--ink-dim);text-align:center;padding:2em;">まだログがありません。</div>';
    return;
  }
  body.innerHTML = recent.map(e =>
    `<div class="log-entry">` +
    (e.sp ? `<div class="log-sp">${escapeHtml(e.sp)}</div>` : '') +
    `<div class="log-tx">${escapeHtml(e.tx).replace(/\n/g, '<br>')}</div>` +
    `</div>`
  ).join('');
  body.scrollTop = body.scrollHeight;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  })[c]);
}

function renderSlots() {
  const body = document.getElementById('save-body');
  const inGame = !!currentSceneKey && !document.getElementById('title-screen').classList.contains('hidden') === false;
  const canSave = !!currentSceneKey && document.getElementById('title-screen').classList.contains('hidden');
  let html = '';
  // オートスロット
  html += renderSlotHtml('auto', meta.autoSlot, canSave, true);
  // 手動3スロット
  for (let i = 0; i < 3; i++) {
    html += renderSlotHtml(i, meta.slots[i], canSave, false);
  }
  body.innerHTML = html;
  body.querySelectorAll('[data-save-idx]').forEach(b => {
    b.onclick = () => {
      const idx = b.dataset.saveIdx;
      if (idx === 'auto') return; // autoは保存ボタンなし
      meta.slots[parseInt(idx, 10)] = snapshotState();
      saveMeta();
      renderSlots();
    };
  });
  body.querySelectorAll('[data-load-idx]').forEach(b => {
    b.onclick = () => {
      const idx = b.dataset.loadIdx;
      const snap = idx === 'auto' ? meta.autoSlot : meta.slots[parseInt(idx, 10)];
      if (!snap) return;
      document.getElementById('title-screen').classList.add('hidden');
      document.getElementById('ending-screen').classList.remove('show');
      document.getElementById('choices').classList.remove('show');
      document.getElementById('action-bar').classList.add('show');
      restoreState(snap);
      closeAllPanels();
    };
  });
  body.querySelectorAll('[data-del-idx]').forEach(b => {
    b.onclick = () => {
      const idx = b.dataset.delIdx;
      if (idx === 'auto') meta.autoSlot = null;
      else meta.slots[parseInt(idx, 10)] = null;
      saveMeta();
      renderSlots();
    };
  });
}

function renderSlotHtml(idx, snap, canSave, isAuto) {
  const name = isAuto ? 'オートセーブ（章境界）' : `スロット ${parseInt(idx, 10) + 1}`;
  let meta_ = '（空）';
  if (snap) {
    const sc = scenes[snap.sceneKey];
    const chap = chapterJumps.slice().reverse().find(c => {
      const scIdx = chapterJumps.findIndex(x => x.key === c.key);
      const curIdx = chapterJumps.findIndex(x => x.key === snap.sceneKey);
      return scIdx <= curIdx;
    });
    const d = new Date(snap.timestamp);
    const ts = `${d.getFullYear()}/${('0'+(d.getMonth()+1)).slice(-2)}/${('0'+d.getDate()).slice(-2)} ${('0'+d.getHours()).slice(-2)}:${('0'+d.getMinutes()).slice(-2)}`;
    const clueN = Object.keys(snap.gameState).filter(k => k.startsWith('has_clue_') && snap.gameState[k]).length;
    meta_ = `${chap ? chap.title : snap.sceneKey} ／ 伏線 ${clueN}/8 ／ ${ts}`;
  }
  const saveBtn = (canSave && !isAuto) ? `<button class="slot-btn" data-save-idx="${idx}">保存</button>` : '';
  const loadBtn = snap ? `<button class="slot-btn" data-load-idx="${idx}">読込</button>` : '';
  const delBtn = snap ? `<button class="slot-btn danger" data-del-idx="${idx}">削除</button>` : '';
  return `<div class="slot">
    <div class="slot-info">
      <div class="slot-name">${name}</div>
      <div class="slot-meta">${meta_}</div>
    </div>
    <div class="slot-actions">${saveBtn}${loadBtn}${delBtn}</div>
  </div>`;
}

function renderProfiles() {
  const body = document.getElementById('profiles-body');
  body.innerHTML = characterProfiles.map(p => {
    const unlocked = !!meta.readScenes[p.unlock];
    const cls = unlocked ? '' : ' locked';
    if (!unlocked) {
      return `<div class="profile-card${cls}">
        <div class="profile-name">？？？</div>
        <div class="profile-nameEn">UNKNOWN</div>
        <div class="profile-meta">──────</div>
        <div class="profile-row">まだ出会っていない人物。</div>
      </div>`;
    }
    return `<div class="profile-card${cls}">
      <div class="profile-name">${escapeHtml(p.name)}</div>
      <div class="profile-nameEn">${escapeHtml(p.nameEn)} ／ ${p.age}</div>
      <div class="profile-meta">${escapeHtml(p.role)}</div>
      <div class="profile-row"><strong>人物</strong>${escapeHtml(p.summary)}</div>
      <div class="profile-row"><strong>魅力</strong>${escapeHtml(p.charm)}</div>
      <div class="profile-row"><strong>口調</strong>${escapeHtml(p.voice)}</div>
      <div class="profile-sample">${escapeHtml(p.sample)}</div>
    </div>`;
  }).join('');
}

function renderClues() {
  const body = document.getElementById('clues-body');
  const keys = ['has_clue_A','has_clue_B','has_clue_C','has_clue_D','has_clue_E','has_clue_F','has_clue_G','has_clue_H'];
  const detail = {
    has_clue_A: '冬木綾乃が夕食時、白鷺の薬入れに自然に手を添えていた。',
    has_clue_B: '白鷺が「最近、薬の効きが悪い」と冬木にだけ零した。',
    has_clue_C: '暖炉の薪入れに鈍く光る金属片／青銅の文鎮。',
    has_clue_D: '榊の袖口に、くすんだ茶褐色の微かな血痕。',
    has_clue_E: '白鷺遺体の打撲傷、周辺の血の飛び散りが異常に少ない。',
    has_clue_F: '冬木の手帳に「20年」の書き込みと、古い新聞記事の切り抜き。',
    has_clue_G: '美咲の電話相手「佐伯」――水無月透の元同僚。',
    has_clue_H: '二十年前、若い夫婦が白鷺を訪ねて追い返された。'
  };
  body.innerHTML = keys.map(k => {
    const got = gameState[k];

    return `<div class="clue-item${cls}">
      <span class="clue-key">${k.replace('has_clue_','伏線 ')}</span>
      ${label}<br>
      <span style="font-size:0.78rem; color:var(--ink-dim)">${detailText}</span>

function renderChapters() {
  const body = document.getElementById('chapter-body');
  body.innerHTML = chapterJumps.map(c => {
    const unlocked = !!meta.readScenes[c.key] || c.key === 'prologue_01';
    return `<button class="jump-btn${unlocked ? '' : ' locked'}" data-jump="${c.key}" ${unlocked ? '' : 'disabled'}>
      ${c.title}${unlocked ? '' : '　（未到達）'}
    </button>`;
  }).join('');
  body.querySelectorAll('[data-jump]').forEach(b => {
    b.onclick = () => {
      if (b.disabled) return;
      // 章開始にジャンプ：gameState を初期化
      resetGameState();
      document.getElementById('title-screen').classList.add('hidden');
      document.getElementById('action-bar').classList.add('show');
      document.getElementById('ending-screen').classList.remove('show');
      closeAllPanels();
      goToScene(b.dataset.jump);
    };
  });
}

function renderEndings() {
  const body = document.getElementById('endings-body');
  const main = endingDefs.filter(e => !e.extra);
  const mainSeen = main.filter(e => meta.seenEndings[e.id]).length;
  let html = `<div class="collection-stat">到達 ${mainSeen} / ${main.length}</div>`;
  html += endingDefs.map(e => {
    const seen = !!meta.seenEndings[e.id];
    const cls = seen ? '' : ' locked';
    const typeMap = { bad: 'BAD', normal: 'NORMAL', true: 'TRUE' };
    const typeColor = { bad: 'var(--accent-ember)', normal: 'var(--accent-ice)', true: 'var(--accent-gold)' };
    return `<div class="ending-entry${cls}" data-ending="${e.id}">
      <span class="ending-etitle">
        <span style="color:${typeColor[e.type]};margin-right:0.8em;font-size:0.72rem;letter-spacing:0.3em;">${e.num}</span>
        ${seen ? e.title : '??????'}
      </span>
      <span class="ending-edesc">${seen ? typeMap[e.type] + ' END' : '未到達'}</span>
    </div>`;
  }).join('');
  body.innerHTML = html;
}

function renderSettings() {
  document.querySelectorAll('#seg-speed .seg-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.speed, 10) === meta.settings.textSpeed);
  });
  document.querySelectorAll('#seg-auto-delay .seg-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.delay, 10) === meta.settings.autoDelay);
  });
}

function resetGameState() {
  Object.keys(gameState).forEach(k => {
    if (k.startsWith('has_clue_')) gameState[k] = false;
  });
  gameState.route_choice = null;
  gameState.accuse = null;
  gameState.alone = false;
  gameState.choice_empathy = false;
  gameState.talk_to_mizuki_final = false;
  gameState.investigate_count = 0;
  textLog.length = 0;
  updateClueCount();
}

document.getElementById('btn-menu').addEventListener('click', () => openPanel('panel-menu'));

// 設定
document.querySelectorAll('#seg-speed .seg-btn').forEach(b => {
  b.addEventListener('click', () => {
    meta.settings.textSpeed = parseInt(b.dataset.speed, 10);
    saveMeta();
    renderSettings();
  });
});
document.querySelectorAll('#seg-auto-delay .seg-btn').forEach(b => {
  b.addEventListener('click', () => {
    meta.settings.autoDelay = parseInt(b.dataset.delay, 10);
    saveMeta();
    renderSettings();
  });
});
document.getElementById('btn-reset-progress').addEventListener('click', () => {
  if (!confirm('全ての進捗・セーブ・既読情報をリセットします。よろしいですか？')) return;
  resetAllProgress();
  alert('リセットしました。');
  closeAllPanels();
  document.getElementById('title-screen').classList.remove('hidden');
  document.getElementById('action-bar').classList.remove('show');
});

// メニューハブ → 各パネル
document.querySelectorAll('[data-menu]').forEach(b => {
  b.addEventListener('click', () => openPanel(b.dataset.menu));
});
document.getElementById('btn-return-title').addEventListener('click', () => {
  if (!confirm('タイトルに戻ります。\n未セーブの進行は失われます（オートセーブは維持）。')) return;
  closeAllPanels();
  document.getElementById('ending-screen').classList.remove('show');
  document.getElementById('action-bar').classList.remove('show');
  document.getElementById('title-screen').classList.remove('hidden');
});

// パネル閉じる
document.querySelectorAll('[data-close]').forEach(b => {
  b.addEventListener('click', closeAllPanels);
});

// クリック／タップで進める
document.getElementById('game').addEventListener('click', (e) => {
  if (!document.getElementById('title-screen').classList.contains('hidden')) return;
  if (document.getElementById('choices').classList.contains('show')) return;
  if (document.getElementById('ending-screen').classList.contains('show')) return;
  if (document.getElementById('chapter-title').classList.contains('show')) return;
  if (document.getElementById('fin-screen').classList.contains('show')) return;
  if (document.querySelector('.panel.show')) return;
  if (e.target.closest('#hud')) return;
  if (e.target.closest('#action-bar')) return;
  advance();
});

// ==========================================================================
// 長押しでスキップ（モバイル用、既読のみ）
// ==========================================================================
let longPressTimer = null;
let longPressTriggered = false;
const LONG_PRESS_MS = 500;

function isInGameplay() {
  if (!document.getElementById('title-screen').classList.contains('hidden')) return false;
  if (document.getElementById('choices').classList.contains('show')) return false;
  if (document.getElementById('ending-screen').classList.contains('show')) return false;
  if (document.querySelector('.panel.show')) return false;
  return true;
}

function onPressStart(e) {
  if (!isInGameplay()) return;
  if (e.target && (e.target.closest('#hud') || e.target.closest('#action-bar'))) return;
  longPressTriggered = false;
  clearTimeout(longPressTimer);
  longPressTimer = setTimeout(() => {
    if (!meta.readScenes[currentSceneKey]) return;
    longPressTriggered = true;
    setSkipMode(true);
  }, LONG_PRESS_MS);
}

function onPressEnd() {
  clearTimeout(longPressTimer);
  if (longPressTriggered) {
    // 長押しで開始したスキップは離したら止める
    setSkipMode(false);
    longPressTriggered = false;
  }
}

const gameEl = document.getElementById('game');
gameEl.addEventListener('pointerdown', onPressStart);
gameEl.addEventListener('pointerup', onPressEnd);
gameEl.addEventListener('pointercancel', onPressEnd);
gameEl.addEventListener('pointerleave', onPressEnd);

// iOS のピンチズーム・ダブルタップ拡大を抑止
document.addEventListener('gesturestart', (e) => e.preventDefault());
document.addEventListener('dblclick', (e) => {
  if (isInGameplay()) e.preventDefault();
});

// キーボード
document.addEventListener('keydown', (e) => {
  const inGame = document.getElementById('title-screen').classList.contains('hidden');
  const finShown = document.getElementById('fin-screen').classList.contains('show');
  if (finShown) return; // Fin 表示中は全キー封印
  if (e.key === 'Escape') {
    if (document.querySelector('.panel.show')) closeAllPanels();
    else if (inGame) openPanel('panel-menu');
    return;
  }
  if (!inGame) return;
  if (document.querySelector('.panel.show')) return;
  if (document.getElementById('ending-screen').classList.contains('show')) return;
  if (document.getElementById('choices').classList.contains('show')) return;

  if (e.key === ' ' || e.key === 'Enter') {
    e.preventDefault();
    advance();
  } else if (e.key === 'a' || e.key === 'A') {
    setAutoMode(!autoMode);
  } else if (e.key === 's' || e.key === 'S') {
    if (meta.readScenes[currentSceneKey]) setSkipMode(!skipMode);
  } else if (e.key === 'l' || e.key === 'L') {
    openPanel('panel-log');
  }
});

// 初期化
loadMeta();
initSnow();
refreshFinaleCTA();
// 続きから・章選択・エンディングは autoSlot/seenEndings/readScenes をロード後に反映
</script>
